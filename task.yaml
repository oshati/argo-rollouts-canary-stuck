id: argo-rollouts-canary-stuck
prompt: |
  [Context]
  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  Bleater is deployed on Kubernetes (k3s) in the `bleater` namespace. You can check all available namespaces at `/home/ubuntu/.allowed_namespaces`.

  Information about the application and supporting infrastructure is available at http://gitea.devops.local/root/bleater-app/wiki. Passwords are stored here: http://passwords.devops.local.

  Your email is set up at devops@nebula.local and can be accessed via http://maddy.devops.local.
  For team communication, Mattermost is used and is available at http://mattermost.devops.local.

  [TASK]
  The `bleater-like-service` canary hasn't moved past 20% weight for hours.
  On-call keeps getting paged, nobody on the platform team can get it to advance, and production traffic is still 100% on the stable version. Your job is to get this rollout fully promoted to production weight and make sure an incident like this cannot silently recur.

  The end state must be a genuinely healthy rollout: the canary service wired through to the app, analysis that would catch a real regression, and a clean history with no leftover failure artifacts. The platform team also wants assurance that any future stall surfaces clearly instead of sitting unnoticed.

  Everything is in the `bleater` namespace. Prometheus is in the `monitoring` namespace. The Argo Rollouts controller is already running. You may also need to look beyond `bleater` — GitOps and admission tooling live in other namespaces on this cluster.

metadata:
  category: kubernetes
  difficulty: hard

id: argo-rollouts-canary-stuck
prompt: |
  [Context]
  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  Bleater is deployed on Kubernetes (k3s) in the `bleater` namespace. You can check all available namespaces at `/home/ubuntu/.allowed_namespaces`.

  Information about the application and supporting infrastructure is available at http://gitea.devops.local/root/bleater-app/wiki. Passwords are stored here: http://passwords.devops.local.

  Your email is set up at devops@nebula.local and can be accessed via http://maddy.devops.local.
  For team communication, Mattermost is used and is available at http://mattermost.devops.local.

  [TASK]
  The bleater-like-service canary has been sitting at 20% weight for over two hours.
  Mattermost keeps pinging that the weight hasn't moved, and nobody on the
  platform team has been able to figure out why the rollout won't advance.

  The service was recently migrated to Argo Rollouts for progressive delivery.
  The canary AnalysisRun that gates promotion keeps coming back Inconclusive —
  it never flips to Successful or Failed, so the rollout just hangs in limbo.
  The analysis step queries Prometheus for the error rate, but the observability
  team made scrape-interval changes a few weeks ago as part of a cost-reduction
  exercise, and we suspect the query parameters no longer match reality.

  However, the Inconclusive status may not be the only problem. The on-call
  engineer who first triaged this noticed that even after manually forcing the
  analysis to pass, requests weren't routing to the canary as expected, and
  the rollout history looks messy from previous failed attempts that were never
  cleaned up.

  Something in the cluster also seems to be actively interfering with fixes —
  an engineer reported that changes to the analysis configuration kept reverting
  shortly after being applied.

  Please investigate all the contributing factors, fix whatever is preventing
  the canary from advancing, and get the rollout fully promoted through all
  its configured steps to production weight. The end state should be a clean,
  Healthy rollout with no leftover failed or inconclusive analysis artifacts.

  Also make sure the rollout cannot silently hang like this again — stalled
  promotions should time out and surface a clear condition.

  Everything is in the bleater namespace. Prometheus is in the monitoring
  namespace. The Argo Rollouts controller is already running.

metadata:
  category: kubernetes
  difficulty: hard
